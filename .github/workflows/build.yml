name: Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - run: corepack enable
      - run: yarn install
      - run: yarn build

      - name: Package dist folder
        run: cd dist && zip -r ../tgfoa-bepinex.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: tgfoa-bepinex
          path: tgfoa-bepinex.zip
          retention-days: 7
